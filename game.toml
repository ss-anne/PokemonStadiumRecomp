# ── Decompressed fragments (CPU-decompressed at runtime) ──────────────────
#
# Stadium decompresses fragments from PERS-SZP/Yay0 wrappers in ROM at
# runtime via CPU code (NOT PI DMA). The decompressed bytes — including
# all MIPS instructions — never appear at any single offset in
# baserom.z64, so pret's splat can't see them.

# Single-block: id=0xC0, vram 0x8D000000. Tiny dispatch fragment
# (0x60 bytes decompressed, just a FRAGMENT header + small entry).
# Surfaces during the menu-load path after the title-screen Start
# press. Wrapper at ROM 0x5C7A70 (PERS-SZP/Yay0).
[[input.decompressed_section]]
name = "frag_8D000000"
vram = 0x8D000000
rom_wrapper = 0x5C7A70
wrapper_format = "pers_szp_yay0"

# Pattern: vram 0x8FF00000. Stadium's primary dynamic-asset slot —
# 282 distinct fragment bodies stream through it as the player
# traverses content. Each section is auto-synthesized per wrapper;
# runtime register_runtime_fragment hashes the bytes Stadium just
# decompressed and binds func_map to the matching section.
[[input.decompressed_section_pattern]]
base_name      = "frag_8FF00000"
vram           = 0x8FF00000
wrapper_format = "pers_szp_yay0"

[output]
collision_policy = "suffix"

# ── Runtime fragment registration hook ────────────────────────────────────
#
# Stadium has two fragment-load paths: (1) PI DMA → load_overlays(), which
# registers funcs in func_map at the runtime address each section was
# DMA'd to; and (2) CPU-side decompression (PERS-SZP/Yay0) that writes
# fragment bytes to RDRAM via direct stores. Path (2) bypasses do_dma
# entirely, so load_overlays / the trampoline scanner never see those
# fragments.
#
# Both paths converge on Memmap_RelocateFragment(id, fragment_ptr) right
# before the fragment is dispatched. Hooking that one chokepoint covers
# both paths.
[[patches.hook]]
func = "Memmap_RelocateFragment"
before_vram = 0x80001E50  # first instr of Memmap_RelocateFragment ⇒ entry hook
text = "recomp_register_runtime_fragment(rdram, ctx->r4, ctx->r5);"

# n_alLoadParam voice probe — fires just before the crashing load
# `lw $t5, 0x8($v1)` at MIPS PC 0x8004FAE4. ctx->r2 = v0, ctx->r3 = v1
# (post `lw $v1, 0xC($v0)` at 0x8004FAD8), ctx->r7 = a3. Records the
# tuple in a 64-entry ring and prints to stderr the first time v1 is
# OOB of RDRAM [0x80000000, 0x80800000) — that case would trip the
# kids-club SIGSEGV. Without the probe we have no way to identify
# which voice descriptor v0 came from.
[[patches.hook]]
func = "n_alLoadParam"
before_vram = 0x8004FAE4
text = "pkmnstadium_audio_voice_check(ctx->r7, ctx->r2, ctx->r3);"

# n_alAdpcmPull aClearBuffer-overflow probe (post-title audio bug
# 2026-05-06). Fires at the START of the inlined `aClearBuffer(...)`
# block at PC 0x8004F908, just before the `lh $t7, 0($t3)` that
# loads *outp. At this point:
#   $s0 (r16) = filter (N_PVoice*)
#   $s2 (r18) = nOver
#   $v1 (r3)  = startZero
#   $t3 (r11) = outp pointer
# When nOver > 0x400 (impossibly big), dump the voice descriptor +
# wave table fields. Captures the FIRST runaway voice we see — once
# dumped, hook is silent for the rest of the run.
[[patches.hook]]
func = "n_alAdpcmPull"
before_vram = 0x8004F908
text = "pkmnstadium_adpcm_overflow_dump(rdram, ctx->r16, ctx->r18, ctx->r3, ctx->r11);"

# n_alLoadParam(SET_WAVETABLE) entry probe — captures (filter, paramID,
# param) for every call. When paramID == 5 (SET_WAVETABLE) AND the
# pointed-to memory's first 4 bytes don't look like a plausible base
# pointer, log to stderr. The post-title audio bug 2026-05-06 traced
# to a voice with dc_table.base = 0x810B810B (repeating data bytes),
# which means the SET_WAVETABLE caller passed a non-wavetable pointer.
# This probe identifies the FIRST bogus call so we can trace upstream.
[[patches.hook]]
func = "n_alLoadParam"
before_vram = 0x8004F95C
text = "pkmnstadium_set_wavetable_probe(rdram, ctx->r4, ctx->r5, ctx->r6);"

# main_pool_pop_state caller probe — track who frees memory in the
# pool. The post-title audio UAF (2026-05-06) traced to a 1 MiB
# alloc at 0x8018A1B0 that overlaps wavetable structs voices still
# point at; the bump-allocator can only land there if a pop ran in
# between. This probe logs every pop's caller PC + gCurrentGameState
# + pool-top before/after so the post-mortem identifies which Stadium
# function popped the bank-resident memory without first stopping
# the voices.
# main_pool_pop_state entry: (a) log the pop for diagnostics and (b)
# silence libnaudio voices whose wavetable struct lives in the about-to-be
# -freed range [saved.L, current.L). The voice-silencing logic lives
# generically in librecomp (audio_uaf_protect.cpp); the layout for finding
# Stadium's voice array is registered at startup in src/main/main.cpp.
# This single hook subsumes the prior per-scene fragment36 audio-stop
# hook (func_8004FF20) and prevents the rental-pokemon UAF + AREA_SELECT
# UAF + post-title UAF families generically.
[[patches.hook]]
func = "main_pool_pop_state"
before_vram = 0x80002838
text = "pkmnstadium_pool_pop_log(rdram, ctx->r4, ctx->r31); pkmnstadium_pool_pop_silence_voices(rdram);"

# n_alFxPull / n_alMainBusPull triangulation for the quick-battle
# audio cmd-buffer NULL+0xBC crash 2026-05-03. The crash is in
# n_alMainBusPull (funcs_19.c:4796) at `sw $s7, 0x4($v0)` where
# $v0=0xB8. $v0 is the return from the bus filter handler call,
# which RDRAM dump confirms = 0x800500C0 = n_alFxPull. Hooks below
# tell us exactly what n_alFxPull saw on entry, returned on exit,
# and what state n_alMainBusPull was in just before the SEH.
[[patches.hook]]
func = "n_alFxPull"
before_vram = 0x800500C0   # entry instr (addiu $sp,$sp,-0x70)
text = "pkmnstadium_afxpull_enter(ctx->r4, ctx->r5);"

[[patches.hook]]
func = "n_alFxPull"
before_vram = 0x80050398   # `jr $ra` — $v0 = $s0+8 already set at 0x80050370
text = "pkmnstadium_afxpull_exit(ctx->r2, ctx->r16);"

[[patches.hook]]
func = "n_alMainBusPull"
before_vram = 0x80050D14   # the exact `sw $s7, 0x4($v0)` that SEH'd
text = "pkmnstadium_mbp_precrash(ctx->r2, ctx->r23, ctx->r5);"

# Dispatch-time probes: who actually gets called by `jalr $t9` at
# 0x80050CF4? Repro 2 (2026-05-03) showed mbp_precrash BAD without
# afxpull_exit BAD, so either n_alFxPull was never entered (the
# dispatch picked up a different handler) OR a different call path
# bypassed the exit hook. These two probes settle it.
[[patches.hook]]
func = "n_alMainBusPull"
before_vram = 0x80050CF4   # the `jalr $t9` itself ($t8=n_syn, $t9=handler)
text = "pkmnstadium_mbp_dispatch(ctx->r24, ctx->r25);"

[[patches.hook]]
func = "n_alMainBusPull"
before_vram = 0x80050CFC   # right at after_0: label, $v0=handler return
text = "pkmnstadium_mbp_dispatch_ret(ctx->r2);"

# n_alMainBusPull entry/exit recursion-depth probes.
# At seq 3436 the dispatch (recursive call) returned v0=0xB8 — a value
# only constructible by a recursive frame's pointer arithmetic ($s0 = $v0 + 0x10
# at line 4813). To find which frame first produces a bogus pointer, we need
# to see entry/exit of EVERY frame with depth + return values.
[[patches.hook]]
func = "n_alMainBusPull"
before_vram = 0x80050CA0   # entry: addiu $sp,$sp,-0x40 (function prolog start)
text = "pkmnstadium_mbp_entry(ctx->r4, ctx->r5, ctx->r2);"

[[patches.hook]]
func = "n_alMainBusPull"
before_vram = 0x80050F14   # exit: jr $ra (after $v0 = $s0 set at 0x80050EEC)
text = "pkmnstadium_mbp_exit(ctx->r2, ctx->r16);"

