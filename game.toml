# Util_ConvertAddrToVirtAddr exit hook — log every (input → output)
# where output is a non-NULL pass-through (= < 0x80000000). Those
# are the cases where a segment/fragment lookup failed and the raw
# input was returned, which downstream callers treat as a vaddr and
# crash on. At hook position 0x80002F20 (the jr $ra), ctx->r4 still
# holds the original input arg, ctx->r2 has the return value.
#
# Also drives the Option-C variant-selection census: any input in
# the pattern bucket triggers a one-shot structural-parse probe of
# every loaded variant whose size covers the offset. Pass `rdram`
# so the helper can peek at variant bytes.
[[patches.hook]]
func = "Util_ConvertAddrToVirtAddr"
before_vram = 0x80002F20   # right before jr $ra
text = "pkmnstadium_addr_translate_log(rdram, (uint32_t)ctx->r4, (uint32_t)ctx->r2);"

# func_80010FDC entry diagnostic — geo layout cmd-8 handler that
# converts arg1 from seg-addr to vaddr then CALLS it. Stadium hits
# a lookup miss here at 0x00000E00; this hook logs the input
# arg1 (raw seg-addr from geo layout) so we can find which geo
# layout source has the bad function-pointer reference. At entry:
# ctx->r4=arg0 (GraphNode*), ctx->r5=arg1 (seg-addr fn-ptr),
# ctx->r6=arg2 (data void*).
[[patches.hook]]
func = "func_80010FDC"
before_vram = 0x80010FDC   # entry
text = "pkmnstadium_geo_render_call_log((uint32_t)ctx->r4, (uint32_t)ctx->r5, (uint32_t)ctx->r6);"

