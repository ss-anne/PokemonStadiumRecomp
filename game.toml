# ── Patches ─────────────────────────────────────────────────────────────────
# Ignored functions: symbols defined by both the recompiled ELF
# (pret bundles libultra source) AND librecomp's reimplementations.
# Listed here so the engine appends _recomp to the symbol from
# the ELF and the link picks librecomp's version.
# Add more entries as the linker reports duplicate-symbol errors.
[patches]
ignored = [
    "osSetTime",
    # PSR_TEMP_PATCH: free-battle-modal-softlock — see TEMP_PATCHES.md
    # Stadium-specific Option B fix for the cooperative-scheduler
    # deadlock: func_8000771C is a tight predicate-only busy-wait
    # (`while (func_80001C90() == 0) {}`) that blocks the game thread
    # waiting on D_800846C0.queue.validCount > 0. ultramodern's
    # cooperative scheduler can't preempt the busy-wait, so blocked
    # game threads (e.g. the audio scheduler waiting on a DP-complete
    # message in external_messages) can starve forever — Free Battle
    # Rule/Cup confirm hangs at this point. We replace func_8000771C
    # with a hand-written version in extras.c that yields between
    # iterations (lowering thread priority + yield_self_1ms) so other
    # game threads can run, drain external_messages, and eventually
    # write the DONE that unblocks the predicate. The proper runtime
    # fix lives in N64ModernRuntime/ultramodern (Option C in the
    # backlog); this is the targeted Stadium-only stopgap.
    # See memory: project_free_battle_modal_softlock_2026_05_08.
    "func_8000771C",
]

# PSR_TEMP_PATCH: petit-cup-softlock — see TEMP_PATCHES.md
# Same cooperative-scheduler busy-wait family as func_8000771C, but
# inlined inside func_80003680 (JPEG decoder) so a whole-function
# replacement isn't tractable. Hook fires before the BEQ at vram
# 0x80003778 (the loop's back-edge test); helper yields with a
# priority drop when the predicate ($v0/ctx->r2) is still 0.
# See memory: project_petit_cup_softlock_optionB_2026_05_09.
[[patches.hook]]
func = "func_80003680"
before_vram = 0x80003778
text = "pkmnstadium_petit_cup_yield(rdram, ctx);"

