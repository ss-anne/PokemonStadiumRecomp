# Disabled 2026-04-29: fade-out wait bypass hooks for func_82100B1C
# are removed in favor of letting the fade run naturally. Reason:
# while these hooks unblocked fragment36 cleanup, they created an
# audio use-after-free at AREA_SELECT — fragment36's SoundBank
# (loaded into a 1 MiB main_pool buffer at fragment36.c:351) gets
# discarded when main_pool pops, but the synth's voice state still
# holds pointers into it. Without the fade ramping voices to silence
# first, the synth then derefs garbage. The proper fix is to let
# the wait run; if it hangs, the gfx-scheduler tick path needs work
# (func_800069F0 should run once per frame from func_80006FE8 — see
# the fade-tick counters added to extras.c).
#
# [[patches.hook]] func = "func_82100B1C" before_vram = 0x82100B1C
#   text = "pkmnstadium_force_fade_done(rdram);"
# [[patches.hook]] func = "func_80007604" before_vram = 0x8000760C
#   text = "ctx->r2 = pkmnstadium_force_80007604_ret((uint32_t)ctx->r2);"
# [[patches.hook]] func = "func_82100B1C" before_vram = 0x82100B58
#   text = "ctx->r2 = 1;"

# Force func_800484E0 (asset-loader pending count) to always return 0,
# bypassing the wait loop in func_8000D2B4.
[[patches.hook]]
func = "func_800484E0"
before_vram = 0x8004856C   # before jr $ra (delay slot is just sp adjust)
text = "ctx->r2 = 0;"

# Audio voice-table NULL-deref diagnostic — capture state right before
# the crashing `lw $a0, 0x0($t4)` at 0x8003AF64. At hook position
# 0x8003AF60 (the `addu $t4, $t3, $v0` that computes the bad addr):
#   ctx->r16 = $s0 = arg0->unk_090 (the unk_D_800FC7D0_08C* struct)
#   ctx->r17 = $s1 = arg0 itself (the unk_D_800FC7D0* struct)
#   ctx->r11 = $t3 = MEM_W($s0, 0x2C) = the suspect wave-table pointer
#   ctx->r3  = $v1 = MEM_HU($s1, 0xC2) = the array index
[[patches.hook]]
func = "func_8003AD58"
before_vram = 0x8003AF60
text = "pkmnstadium_audio_diag(rdram, (uint32_t)ctx->r16, (uint32_t)ctx->r17, (uint32_t)ctx->r11, (uint32_t)MEM_W(ctx->r16, 0X28), (uint16_t)ctx->r3);"

# Memmap_GetFragmentVaddr data-context override.
#
# Bounded scope: only intervenes for inputs in 0x8FF00000-range
# (the known-ambiguous decompressed_section_pattern bucket). Reads
# the geo walker's current command pointer (gGeoLayoutCommand at
# vaddr 0x800ABE00) and passes it as the "data context": whichever
# variant's [base, base+size) contains gGeoLayoutCommand is the
# variant the literal should resolve against. Restores the original
# game's implicit "active variant = currently-walked variant"
# invariant without the single-pointer-per-id constraint.
[[patches.hook]]
func = "Memmap_GetFragmentVaddr"
before_vram = 0x800020E0   # entry — save input arg
text = "pkmnstadium_memmap_get_enter((uint32_t)ctx->r4);"

[[patches.hook]]
func = "Memmap_GetFragmentVaddr"
before_vram = 0x80002140   # exit — override before delay-slot
# MEM_W macro expects a sign-extended gpr value as the address.
# The literal 0x800ABE00 is unsigned and would wrap; cast to int32_t
# first so the high bit triggers sign-extension to 0xFFFFFFFF800ABE00.
text = "ctx->r4 = pkmnstadium_memmap_get_exit((uint32_t)ctx->r4, (uint32_t)MEM_W(0, (int32_t)0x800ABE00));"

# Segment-map setter/clear hooks — capture every gSegments[id]
# write so we can answer "is segment 6 ever mapped before attract,
# and if so, when does it get cleared?" Hook fires at function
# entry so ctx->r31 still holds the caller's return PC. Reads
# gCurrentGameState (vram 0x80075668) so we can correlate writes
# to BOOT/INTRO/TITLE/AREA_SELECT/etc. transitions.
[[patches.hook]]
func = "Memmap_SetSegmentMap"
before_vram = 0x80001CE0   # entry — function start
text = "pkmnstadium_segmap_set_enter((uint32_t)ctx->r4, (uint32_t)ctx->r5, (uint32_t)ctx->r6, (uint32_t)MEM_W(0, (int32_t)0x80075668));"

[[patches.hook]]
func = "Memmap_ClearSegmentMemmap"
before_vram = 0x80001D9C   # entry — function start
text = "pkmnstadium_segmap_clear_enter((uint32_t)ctx->r4, (uint32_t)MEM_W(0, (int32_t)0x80075668));"

# func_80004258 = ASSET_LOAD inner. Hook at function entry so we can
