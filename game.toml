# game.toml — Pokémon Stadium (US v1.0)
#
# N64Recomp configuration. Single source of truth for what the
# recompiler treats as code, data, manual entries, and renames.
# Per project principles: NO STUBS. If recompilation hits a code
# path it can't handle, fix the engine — never paper over.

[input]
# The verified v1.0 ROM. CMake asserts MD5 ed1378bc...
rom_file_path = "baserom.z64"

# The ELF that pret's disasm produces after `make init && make`
# in disasm/. Carries section addresses, symbols, relocations.
elf_path = "disasm/build/pokestadium-us.elf"

# Output directory for generated C — gitignored. N64Recomp emits
# funcs.h, funcs_N.c per function group, recomp_overlays.inl,
# lookup.cpp into here.
output_func_path = "generated"

# One C file per function group for fast iteration via the linker
# `-u <symbol>` override trick.
single_file_output = false

# ── Function size overrides ────────────────────────────────────────────────
# Hand-written assembly (hasm) functions in pret's disasm have ELF
# symbol size = 0 because the assembler doesn't emit .size for them.
# Without an explicit size, N64Recomp can't recompile them — even
# though the symbol is correctly named in the ELF.
#
# The full set of derived sizes is auto-generated by:
#   python3 tools/derive_function_sizes.py > tools/derived_function_sizes.toml
# and inlined below this marker. Re-run the script and replace the
# section if pret's disasm bumps to a newer ELF.
#
# Per project principles: this is NOT stubbing. The sizes come from
# the actual symbol table layout in pret's ELF — the engine just
# doesn't auto-derive them yet (separate engine fix to upstream).

# === BEGIN AUTO-GENERATED FUNCTION SIZES ===
