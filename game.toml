# game.toml — Pokémon Stadium (US v1.0)
#
# N64Recomp configuration. Single source of truth for what the
# recompiler treats as code, data, manual entries, and renames.
# Per project principles: NO STUBS. If recompilation hits a code
# path it can't handle, fix the engine — never paper over.

[input]
# Entrypoint: per pret's splat yaml, the .text segment is at vram
# 0x80000400 and the first subsegment is `entry` (asm/us/entry.s,
# label `entry_point`). entry_point bzero's BSS then `jr`s to Main
# at 0x80000530. We need entrypoint to match section 5's declared
# ram_addr so load_overlays maps section 5 onto its real VRAM —
# otherwise func_map[0x80000530] never gets populated and the jr
# Main inside the entry asm hits a lookup miss.
entrypoint = 0x80000400

# Trace mode: emit TRACE_ENTRY()/TRACE_RETURN() at every recompiled
# function boundary. include/trace.h defines them as a push into a
# 4096-slot ring exposed via the TCP debug server's trace_recent
# command. Lets us see exactly which game functions are executing
# right now — critical for diagnosing where boot is stuck.
trace_mode = true

# The verified v1.0 ROM. CMake asserts MD5 ed1378bc...
rom_file_path = "baserom.z64"

# The ELF that pret's disasm produces after `make init && make`
# in disasm/. Carries section addresses, symbols, relocations.
elf_path = "disasm/build/pokestadium-us.elf"

# Output directory for generated C — gitignored. N64Recomp emits
# funcs.h, funcs_N.c per function group, recomp_overlays.inl,
# lookup.cpp into here.
output_func_path = "generated"

# List of ELF sections that get DMA'd to a runtime address that may
# differ from their link-time vram. The recompiler reads each
# .rel.<name> section and emits RELOC_HI16/RELOC_LO16 macros that
# resolve to section_addresses[idx] + offset at runtime. Without
# this, fragment-internal LUI/ADDIU pairs would bake the link-time
# vram (e.g. 0x86B10000 for fragment 17), which the runtime
# doesn't have committed — leading to access violations on data
# loads several levels into fragment dispatch (see
# project_chunked_overlays_and_trampolines.md).
relocatable_sections_path = "fragments_relocatable.txt"

# pret/pokestadium names BSS sections with the convention
# `.fragmentN_bss` (underscore), not the ELF default `.fragmentN.bss`
# (period). Override the suffix so the elf parser pairs each
# fragment's bss section with its parent and remaps bss-targeted
# relocs to the parent section's index. Without this, R_MIPS_HI16/
# LO16 entries pointing into .fragment17_bss surface with
# target_section = 77 (a non-relocatable bss section) and the
# recompiler falls back to baking the link-time vram literal —
# which is exactly the failure mode this whole reloc work is
# fixing.
bss_section_suffix = "_bss"

# One C file per function group for fast iteration via the linker
# `-u <symbol>` override trick.
single_file_output = false

# ── Function size overrides ────────────────────────────────────────────────
# Hand-written assembly (hasm) functions in pret's disasm have ELF
# symbol size = 0 because the assembler doesn't emit .size for them.
# Without an explicit size, N64Recomp can't recompile them — even
# though the symbol is correctly named in the ELF.
#
# The full set of derived sizes is auto-generated by:
#   python3 tools/derive_function_sizes.py > tools/derived_function_sizes.toml
# and inlined below this marker. Re-run the script and replace the
# section if pret's disasm bumps to a newer ELF.
#
# Per project principles: this is NOT stubbing. The sizes come from
# the actual symbol table layout in pret's ELF — the engine just
# doesn't auto-derive them yet (separate engine fix to upstream).

