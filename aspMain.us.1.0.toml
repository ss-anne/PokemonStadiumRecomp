text_offset = 0
# IMEM is 4KB but the runtime layout is rspboot[0..0x80] + aspMain[0x80..0x1080].
# We recompile BOTH together so aspMain's branches into rspboot helpers (e.g.
# the `beq r3, $0, L_0044` finish-task call near the end of aspMain) resolve.
#
# The combined source is `aspmain_combined.bin`, generated by the script
# `tools/build_aspmain_combined.py` from:
#   - rspboot: ROM[0x66BC0..0x66C40]  (0x80 bytes, loaded into IMEM[0..0x80])
#   - aspMain: ROM[0x68020..0x69020]  (0x1000 bytes, loaded into IMEM[0x80..0x1080])
#
# WHY: aspMain's J/JAL absolute targets reference real-RSP PCs in [0x1000, 0x2080).
# Branches to PCs < 0x1080 land in rspboot helpers (DMA wait, dispatch tail,
# task-finish). Stadium's HLE doesn't have a separate rspboot; the simplest
# correct path is to recompile rspboot bytes alongside aspMain so all branches
# resolve in one function.
#
# Earlier the toml had text_offset=0x68020 + text_address=0x04001000, which
# misaligned every absolute J/JAL target by 0x80 — producing the L_11E4
# infinite loop the runtime saw. See memory/project_aspmain_l11e4_hang_analysis.md
# for the full debugging trail.
text_size = 0x1080
text_address = 0x04001000
rom_file_path = "aspmain_combined.bin"
output_file_path = "rsp/aspMain.cpp"
output_function_name = "aspMain"
# Dispatch handler table values, as observed in DMEM[0..0x1F] after
# the runtime's DMA load of ucode_data:
#   0x10EC 0x139C 0x119C 0x1A64 0x11C8 0x17EC 0x1208 0x0000
#   0x0000 0x127C 0x1348 0x1248 0x1C84 0x12D4 0x02B0 0x1384
#
# Each is the PC of an audio-command handler; the L_1048 dispatch
# loop uses `lh DMEM[(r26 >> 23) & 0xFE]` then `jr` to reach them.
# The recompiler can't infer these from static analysis (the table
# is in data, not text), so they need to be declared as indirect
# branch targets explicitly. Without them, any handler call from
# dispatch hits "Unhandled jump target" and exits.
#
# 0x02B0 ((| 0x1000) & 0x1FFF = 0x12B0) is included for completeness
# even though if dispatch ever lands there it indicates a bug
# upstream — that PC sits inside the data segment, not text.
extra_indirect_branch_targets = [
    # Dispatch handler PCs from the table at DMEM[0..0x1F] (loaded
    # from ucode_data ROM 0x7F670). Each is the entry point for one
    # audio command opcode, reached via `lh DMEM[(cmd>>23)&0xFE]`
    # then `jr`. Verified by dumping the live audio command list at
    # data_ptr=0x800C8810 (153 cmds): opcodes 0x02/0x04/0x06/0x0A/
    # 0x0B/0x0C/0x0D/0x0E all appear, dispatching to PCs below.
    0x10EC, 0x139C, 0x119C, 0x1A64, 0x11C8, 0x17EC, 0x1208, 0x127C,
    0x1348, 0x1248, 0x1C84, 0x12D4, 0x12B0, 0x1384,
    # Plus the dead-code init function entry at 0x10A0. Stadium's
    # boot path skips it but if a future refactor calls it
    # indirectly we want the recompiler to handle the branch
    # correctly.
    0x10A0,
    # Boot-path return point for L_10EC's `jr $ra` during the very
    # first L_1120 -> j L_10EC handoff. rspboot leaves r31 = 0x1144
    # on real hardware (verified via Ares oracle: at the first L_10EC
    # entry in the boot trace, r31 = 0x144 (== 0x1144 unmasked)).
    # Without this label the recompiler's do_indirect_jump switch
    # has no case for 0x1144 and falls through to UnhandledJumpTarget.
    # PC 0x1144 sits inside an existing straight-line block; adding
    # it as a target forces the recompiler to split the block so
    # control can re-enter mid-stream.
    0x1144,
]
